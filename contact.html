<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | DispatchPro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="index.html">

<i class="fas fa-truck-moving"></i> DispatchPro

</a>

</div>

</nav>

<section class="py-5">

<div class="container">

<div class="row">

<div class="col-lg-6">

<h2 class="mb-4">
Contact Us
</h2>

<form id="contactForm">

<input
type="text"
class="form-control mb-3"
placeholder="Your Name"
required>

<input
type="email"
class="form-control mb-3"
placeholder="Email Address"
required>

<input
type="tel"
class="form-control mb-3"
placeholder="Phone Number"
required>

<textarea
class="form-control mb-3"
rows="5"
placeholder="Your Message"
required></textarea>

<button
type="submit"
class="btn btn-primary">

Send Message

</button>

</form>

</div>

<div class="col-lg-6">

<h2 class="mb-4">
Company Information
</h2>

<p>
📍 Houston, Texas
</p>

<p>
📞 +1 234 567 890
</p>

<p>
📧 info@dispatchpro.com
</p>

<p>
🕒 24/7 Dispatch Support
</p>

<div class="mt-4">

<iframe
src="https://maps.google.com/maps?q=houston&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%"
height="350"
style="border:0;"
allowfullscreen=""
loading="lazy">

</iframe>

</div>

</div>

</div>

</div>

</section>

<footer class="bg-black text-white text-center py-4">

<p>
© 2026 DispatchPro. All Rights Reserved.
</p>

</footer>

<script>

document
.getElementById("contactForm")
.addEventListener("submit", function(e){

e.preventDefault();

alert("Message Sent Successfully!");

this.reset();

});

</script>

</body>
</html>
